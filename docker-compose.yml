services:
  redis:
    image: redis:7-alpine
    container_name: toxicity-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  api:
    image: python:3.11-slim
    container_name: toxicity-api
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: sh -c "pip install -e . && uvicorn router.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - redis

  ingestion:
    image: python:3.11-slim
    container_name: toxicity-ingestion
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: sh -c "pip install -e . && python -m ingestion.gee_pipeline"
    depends_on:
      - redis

  frontend:
    image: node:20-alpine
    container_name: toxicity-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - api